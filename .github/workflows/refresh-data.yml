name: Refresh nutrition data

# Runs the Playwright scrapers (which can't run on Cloudflare) and uploads the
# regenerated snapshots to the Cloudflare R2 bucket that the web app serves from
# (via web/worker/index.ts). The JSON files are no longer committed; R2 is the
# source of truth and their `updatedAt` drives the freshness badges.
#
# Triggers:
#   - Daily on a schedule (uses the scraper cache where one is available).
#   - On every push to main that touches the scraping engine or a scraper — a
#     deploy whose new logic must regenerate data immediately, so the cache is
#     bypassed (see the "Build nutrition data" step).
#   - Manually, with an optional cache-bypass toggle.
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN   — token with R2 read/write on the account
#   CLOUDFLARE_ACCOUNT_ID  — the Cloudflare account id

on:
  schedule:
    - cron: '0 6 * * *' # daily 06:00 UTC
  push:
    branches: [main]
    # Only the scraping mechanism / scrapers — a change here can alter the
    # output, so the run must re-scrape rather than trust cached results.
    paths:
      - 'src/scrapers/**'
      - 'src/cache.ts'
      - 'src/config.ts'
      - 'src/types.ts'
      - 'src/core/types.ts'
      - 'src/tools/build-web-data.ts'
      - 'package.json'
      - 'yarn.lock'
  workflow_dispatch:
    inputs:
      bypass_cache:
        description: 'Re-scrape everything, ignoring the cache'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: refresh-data
  cancel-in-progress: false

env:
  R2_BUCKET: macropro-data
  DATA_DIR: web/public/data
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Pull the current snapshots down so build:data can preserve prior
      # timestamps/items when a live scrape returns nothing (see
      # resolveUpdatedAt / readExisting in build-web-data.ts). Missing objects
      # (e.g. the very first run) are ignored.
      - name: Seed existing snapshots from R2
        run: |
          mkdir -p "$DATA_DIR"
          for key in index mcdonalds popeyes tacobell wagamama kfc dominos wendys subway; do
            npx wrangler r2 object get "$R2_BUCKET/$key.json" \
              --file "$DATA_DIR/$key.json" --remote || true
          done

      # A push (scraper code changed) or a manual bypass re-scrapes everything;
      # scheduled runs use the cache. `build:data:fresh` passes --no-cache.
      - name: Build nutrition data
        run: >-
          yarn ${{ (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.bypass_cache))
          && 'build:data:fresh' || 'build:data' }}

      - name: Upload snapshots to R2
        run: |
          shopt -s nullglob
          for file in "$DATA_DIR"/*.json; do
            key="$(basename "$file")"
            echo "Uploading $key"
            npx wrangler r2 object put "$R2_BUCKET/$key" \
              --file "$file" \
              --content-type "application/json" \
              --remote
          done
