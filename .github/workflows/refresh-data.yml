name: Refresh nutrition data

# Runs the Playwright scrapers (which can't run on Cloudflare) on a schedule and
# commits the regenerated snapshots in web/public/data. Those JSON files are what
# the static web app serves, and their `updatedAt` drives the freshness badges.

on:
  schedule:
    - cron: '0 6 * * 1' # every Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build nutrition data
        run: yarn build:data

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): refresh nutrition snapshots"
            git push
          fi
